version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "repository"
        out: "internal/database/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_interface: false
        overrides:
          - column: users.provider
            go_struct_tag: 'json:"-"'
          - column: users.sub
            go_struct_tag: 'json:"-"'
