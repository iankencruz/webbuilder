opencollection: 1.0.0

info:
  name: Web Builder
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: oauth2
    flow: authorization_code
    credentials:
      placement: body
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
        url: http://localhost:8080
