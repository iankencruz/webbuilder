opencollection: 1.0.0

info:
  name: Web Builder
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: oauth2
    flow: authorization_code
    callbackUrl: http://localhost:8080/api/auth/zitadel/callback
    credentials:
      clientId: '"/api/auth/zitadel/login"'
      clientSecret: |-
        nh3iZlhjzWX2vz46XLyHRBwXwsL7XtCHmD0FnBhcPPznGsjuzsf8cTHYnfdpCVj6
        nh3iZlhjzWX2vz46XLyHRBwXwsL7XtCHmD0FnBhcPPznGsjuzsf8cTHYnfdpCVj6
        nh3iZlhjzWX2vz46XLyHRBwXwsL7XtCHmD0FnBhcPPznGsjuzsf8cTHYnfdpCVj6
      placement: body
    pkce:
      disabled: true
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
        url: http://localhost:8080
