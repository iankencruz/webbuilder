    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Cookie
      value: session={{session}}
  variables:
    - name: session
      value: Ob8KTfIasFJtMDhUG_WlID7X3DyVP9YV8ttokbKH4oo
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
        url: http://localhost:8080
